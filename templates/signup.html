<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body { background: #0f1419; color: #fff; font-family: Arial; margin: 0; }
        .box { max-width: 400px; margin: 50px auto; background: #1a2332; padding: 40px; border: 1px solid #d4af37; border-radius: 10px; }
        h1 { text-align: center; color: #d4af37; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0f1419; color: #fff; border: 1px solid #d4af37; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #d4af37; color: #0f1419; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background: #fff; }
        .msg { text-align: center; padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
        .error { background: rgba(255,0,0,0.2); color: #ff6b6b; }
        .success { background: rgba(0,255,0,0.2); color: #51cf66; }
        a { color: #d4af37; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚡ MANDY SIGNUP</h1>
        <form id="form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Create Account</button>
        </form>
        <div id="msg" class="msg"></div>
        <p style="text-align: center;"><a href="/login">Already have account?</a></p>
    </div>
    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(e.target);
            const res = await fetch('/signup', {method: 'POST', body: data});
            const json = await res.json();
            const msg = document.getElementById('msg');
            if (res.ok) {
                msg.textContent = json.success;
                msg.className = 'msg success';
                setTimeout(() => window.location.href = json.redirect, 2000);
            } else {
                msg.textContent = json.error;
                msg.className = 'msg error';
            }
        });
    </script>
</body>
</html>
